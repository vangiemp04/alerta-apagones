name: Monitor de apagones

on:
  schedule:
    # Un solo arranque por hora. GitHub cumple mucho mejor con esto
    # que con */10, y el script se queda vivo 55 min revisando cada 2.
    - cron: "3 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: monitor-apagones
  cancel-in-progress: true # el arranque nuevo mata al viejo si quedo colgado

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 58 # red de seguridad: nunca pasa de la hora
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Monitorear LUMA en continuo
        run: python monitor.py
