name: Monitor de apagones

on:
  schedule:
    # Cada 10 minutos. GitHub a veces se atrasa unos minutos en horas pico.
    - cron: "*/10 * * * *"
  workflow_dispatch: # boton para correrlo a mano y probar

permissions:
  contents: write # para hacer commit del estado
  issues: write # para abrir el Issue de alerta

concurrency:
  group: monitor-apagones
  cancel-in-progress: false

jobs:
  revisar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Consultar LUMA y comparar
        id: monitor
        run: python monitor.py

      - name: Abrir Issue si hay apagon nuevo
        if: steps.monitor.outputs.hay_alerta == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITULO: ${{ steps.monitor.outputs.titulo }}
          CUERPO: ${{ steps.monitor.outputs.cuerpo }}
        run: |
          gh issue create \
            --title "$TITULO" \
            --body "$CUERPO" \
            --repo "$GITHUB_REPOSITORY"

      - name: Guardar el estado
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add estado.json muestra_api.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Actualizar estado [skip ci]"
          git push
